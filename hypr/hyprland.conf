####################
### ENV VARIABLES ###
####################
# Essential for NVIDIA and Wayland stability
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1

####################
### MONITOR SETUP ###
####################
monitor=,preferred,auto,1

####################
### INPUT & MOUSE ###
####################
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
}

####################
### DECORATIONS ###
####################
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
col.active_border = rgb(89b4fa) rgb(cba6f7) 45deg # Blue to Mauve gradient
col.inactive_border = rgba(313244aa)

    layout = dwindle
}
animations {
    enabled = true
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

### AUTOSTART ###
####################
exec-once = hyprpaper
exec-once = alacritty --class cava-visualizer -e cava &
exec-once = waybar
exec-once = swaybg -i /home/moe/wallpapers/wallpaper.jpg -m fill

####################
### KEYBINDINGS ###
####################
$mainMod = SUPER

bind = $mainMod, Q, killactive
bind = SUPER, RETURN, exec, alacritty
bind = SUPER, B, exec, zen-browser
bind = $mainMod, M, exit
bind = $mainMod, V, togglefloating
# Each bind must be on its own line
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, F, fullscreen, 0




# --- WORKSPACE BINDS ---
# Switch to workspace 1-5
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move active window to workspace 1-5
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Move active window in the direction of focus
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Move active window to a specific workspace (1-9)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4

# Move focus between workspaces with mouse wheel
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1



##### APPPS ##### 
bind =$mainMod, D, exec, discord
bind = SHIFT, Print, exec, grimblast copysave output
bind = , Print, exec, grimblast copysave area
# This is his actual code from the screenshot

# --- MEDIA KEY DISPATCHERS ---
# These lines map your physical keys to the playerctl command
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioStop, exec, playerctl stop

# Move active window to the special workspace (Minimize)
bind = $mainMod SHIFT, MINUS, movetoworkspace, special:hidden

# Toggle the special workspace (Show/Hide the hidden windows)
bind = $mainMod, MINUS, togglespecialworkspace, hidden
# Use the filter syntax correctly
# If the multi-line block fails, use the Single-Line format:
# --- CORE APPLICATION RULES ---

# Terminal (Kitty/Alacritty)
windowrule {
    name = terminal-rules
    float = off
    match:class = (kitty|Alacritty)
}

# Discord
windowrule {
    name = discord-rules
    float = off
    match:class = (discord)
}

# XDG Portal (for clean UI dialogs)
windowrule {
    name = xdg-portal-rules
    float = on
    center = on
    match:class = (xdg-desktop-portal-gtk)
}

